<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda Studio | Nail Salon</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="apple-touch-icon" href="logo.svg">
    <meta name="theme-color" content="#FF8BA0">
    <link rel="icon" href="https://img.icons8.com/parakeet/96/nails.png">
</head>

<body>
    <!-- Floating Decorations -->
    <div class="bow-floating" style="top: 10%; left: 5%;">🎀</div>
    <div class="bow-floating" style="top: 60%; right: 10%; animation-delay: 2s;">🎀</div>
    <div class="bow-floating" style="bottom: 20%; left: 15%; animation-delay: 4s;">🎀</div>

    <div id="app" class="app-container">
        <header class="app-header">
            <h1 class="logo">Agenda Studio</h1>
            <div id="role-indicator" class="role-badge">Cargando...</div>
        </header>

        <main id="view-container">
        </main>

        <nav class="bottom-nav">
            <button onclick="app.navigateTo('calendar')" class="nav-item active">
                <i>📅</i><span>Agenda</span>
            </button>
            <button onclick="app.navigateTo('earnings')" class="nav-item">
                <i>💰</i><span>Ingresos</span>
            </button>
            <button onclick="app.navigateTo('settings')" class="nav-item">
                <i>⚙️</i><span>Ajustes</span>
            </button>
        </nav>
    </div>

    <!-- Premium Modal -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-content">
            <!-- Form content -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <script>
        // Force refresh service worker on load if needed
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=' + Date.now());
        }
    </script>
</body>

</html>
